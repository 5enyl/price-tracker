<!DOCTYPE html>
<html>
    <head>
        <title>Price Tracker</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <h1>PC Part Price Tracker</h1>

        <table border="1">
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Last Updated</th>
            </tr>

            {% for part in parts%}
            
            <tr>
                <td><a href="/history/{{ part['id'] }}">{{ part['name'] }}</a></td>
                <td>{{ part['category'] }}</td>
                <td>${{ "%.2f"|format(part['price']) }}</td>
                <td>{{ part['last_updated'] }}</td>
            </tr>

            {% endfor %}
        


        </table>
    </body>
</html>
