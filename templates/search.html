<!DOCTYPE html>
<html>
<head>
    <title>Search Parts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<body class="bg-light">
    <div class="container mt-5">
        <a href="/" class="btn btn-secondary mb-3">← Back</a>
        <h1 class="mb-4">Search Newegg</h1>

        <form method="POST">
            <div class="input-group mb-4">
                <input type="text" name="query" class="form-control" placeholder="e.g. RTX 4090" value="{{ query }}">
                <button class="btn btn-primary" type="submit">Search</button>
            </div>
        </form>

        {% if results %}
        <table class="table table-striped table-hover shadow-sm bg-white">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Price</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                {% for r in results %}
                <tr>
                    <td>{{ r['name'] }}</td>
                    <td>{{ '$' + '%.2f'|format(r['price']) if r['price'] else 'N/A' }}</td>
                    <td>
    <a href="{{ r['url'] }}" target="_blank" class="btn btn-sm btn-outline-secondary">View</a>
    <button class="btn btn-sm btn-success" data-bs-toggle="collapse" data-bs-target="#add-{{ loop.index }}">Add</button>
</td>
</tr>
<tr id="add-{{ loop.index }}" class="collapse">
    <td colspan="3">
        <form method="POST" action="/add_part">
            <input type="hidden" name="name" value="{{ r['name'] }}">
            <input type="hidden" name="url" value="{{ r['url'] }}">
            <input type="hidden" name="price" value="{{ r['price'] }}">
            <div class="row g-2 mb-2">
                <div class="col"><input type="text" name="category" class="form-control" placeholder="Category (GPU/CPU/etc)"></div>
                <div class="col"><input type="text" name="brand" class="form-control" placeholder="Brand (ASUS/GIGABYTE/etc)"></div>
                <div class="col"><input type="text" name="model" class="form-control" placeholder="Model (ROG STRIX/etc)"></div>
                <div class="col"><input type="text" name="base_model" class="form-control" placeholder="Base Model (RTX 4090/etc)"></div>
                <div class="col-auto"><button type="submit" class="btn btn-success">Save</button></div>
            </div>
        </form>
    </td>

                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% endif %}
    </div>
</body>
</html>
