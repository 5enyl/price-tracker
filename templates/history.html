<!DOCTYPE html>
<html>
    <head>
        <title>{{ part ['name'] }} - Price History</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylsheet">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
<body class="bg-light">
    <div class="container mt-5">
        <a href="/" class="btn btn-secondary mb-3">Back</a>
        <h1 class="mb-4">{{part['name'] }}</h1>

        <div class="bg-white p-4 shadow-sm rounded">
            <canvas id="priceChart"></canvas>
        </div>
    </div>

    <script>
        const labels = {{ prices | map(attribute='timestamp') | list | tojson}};
        const data = {{ prices | map(attribute='price') | list | tojson}};

        new Chart(document.getElementById('priceChart'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Price (USD)',
                    data: data,
                    borderColor: 'rgb(20, 60, 60)',
                    tension: 0.1
                }]
            }
        })
    </script>
</body>
</html>
